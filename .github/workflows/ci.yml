name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DUMMY_API_KEY: ${{ secrets.DUMMY_API_KEY }}
      DUMMY_TOKEN: ${{ secrets.DUMMY_TOKEN }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Verify secrets loaded
        run: |
          test -n "$DUMMY_API_KEY"
          test -n "$DUMMY_TOKEN"
          echo "Secrets available"

      - name: Test outbound request
        run: |
          curl -v https://httpbin.org/get \
            -H "Authorization: Bearer $DUMMY_TOKEN"

      - name: Done
        run: echo "Workflow complete"
